# ---- HTTP (port 80): serve ACME challenge + redirect everything else to HTTPS canonical ----
server {
  listen 80;
  server_name muryshkin.net www.muryshkin.net resume.muryshkin.net www.resume.muryshkin.net;

  # Let’s Encrypt HTTP-01 challenge
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # HTTPS canonical
  location / {
    return 301 https://resume.muryshkin.net$request_uri;
  }
}

# ---- HTTPS canonical host ----
server {
  listen 443 ssl http2;
  server_name resume.muryshkin.net;

  ssl_certificate     /etc/letsencrypt/live/resume.muryshkin.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/resume.muryshkin.net/privkey.pem;

  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  root /usr/share/nginx/html;
  index index.html;

  # SPA fallback
  location / {
    try_files $uri $uri/ /index.html;
  }

  # API proxy
  location /api/ {
    proxy_pass http://backend:8080;
    proxy_http_version 1.1;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 3600;
    proxy_send_timeout 3600;
  }
}

# ---- HTTPS redirects for other hosts ----
server {
  listen 443 ssl http2;
  server_name muryshkin.net www.muryshkin.net www.resume.muryshkin.net;

  ssl_certificate     /etc/letsencrypt/live/resume.muryshkin.net/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/resume.muryshkin.net/privkey.pem;

  return 301 https://resume.muryshkin.net$request_uri;
}