# Server config
server.port=0

# Test database (H2 in-memory for R2DBC)
spring.r2dbc.url=r2dbc:h2:mem:///testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.r2dbc.username=sa
spring.r2dbc.password=

# Initialize schema
spring.sql.init.mode=always
spring.sql.init.schema-locations=classpath:schema.sql

# JWT config (test values)
jwt.secret=0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF0123456789ABCDEF
jwt.expiration=1800000

# OpenAI API key (dummy for tests)
openai.api.key=dummy-key
openai.master-prompt.file=classpath:master-prompt.txt

# Logging configuration
logging.level.com.muryshkin.net.backend.chat=DEBUG
logging.level.org.springframework.web.reactive.function.client=DEBUG

# ReCaptcha configuration (dummy)
recaptcha.secret.key=dummy-recaptcha-key
